# RSS フィードから記事を取得してDiscordに投稿するbotの設定

# RSS フィード URL のリスト
rss_urls:
  - https://zenn.dev/feed
  - https://qiita.com/popular-items/feed
  - https://rss.itmedia.co.jp/rss/2.0/news_bursts.xml
  - https://coliss.com/feed

# Discord 設定
discord:
  # Discord Webhook URL を保持する環境変数名
  webhook_url_env: DISCORD_WEBHOOK_URL
  # Discord 投稿時の表示名
  username: Hot Topics Bot

# 記事収集設定
collect:
  # 各RSSフィードから取得する最大記事数
  max_entries_per_feed: 5